<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive OTP Input with Arrow Keys (HTML + CSS + jQuery)</title>
  
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" 
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
          crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px 30px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    p.subtitle {
      color: #555;
      margin-bottom: 32px;
      font-size: 1.05rem;
    }

    .otp-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 32px 0;
    }

    .otp-box {
      width: 54px;
      height: 64px;
      font-size: 2.1rem;
      font-weight: 600;
      text-align: center;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    .otp-box:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
      background: white;
    }

    .otp-box.filled {
      border-color: #6366f1;
      background: #f3f4f6;
    }

    .otp-box.error {
      border-color: #ef4444;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .code-expire {
        margin-top: 24px;
        font-size: 0.95rem;
        color: #4b5563;
        display: flex;
        gap: 5px;
        align-items: center;
        justify-content: center;
    }

    .code-expire a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }

    .code-expire a:hover {
      text-decoration: underline;
    }

    .code-expire {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #4b5563;
    }

    .code-expire a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }

    .code-expire a:hover {
      text-decoration: underline;
    }

    .resend-box{
      display: none;
    }

    .resend{
      font-size: 0.95rem;
      color: #667eea;
      cursor: pointer;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 20px;
      }
      .otp-box {
        width: 48px;
        height: 56px;
        font-size: 1.8rem;
      }
      .otp-container {
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Verify Your Number</h1>
    <p class="subtitle">Enter the 6-digit code sent to<br>+91 XXXXXX9876</p>

    <div class="otp-container" id="otpContainer">
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
    </div>

    <div class="resend-box">
      Didn't receive code? <a href="#" class="resend" id="resendLink">Resend</a>
    </div>

    <div class="code-expire">
      Code expires in  <span id="timer">00:05</span> 
    </div>

    
  </div>

  <script>
    $(document).ready(function() {
      const $inputs = $('.otp-box');

      // Auto-focus first field
      $inputs.first().focus();

      // Handle typing digits
      $inputs.on('input', function() {
        const val = this.value.replace(/\D/g, ''); // only digits
        this.value = val;

        if (val.length === 1) {
          $(this).addClass('filled').removeClass('error');
          const $next = $(this).next('.otp-box');
          if ($next.length) $next.focus();
        }

        checkIfComplete();
      });

      // Handle backspace, delete, arrows
      $inputs.on('keydown', function(e) {
        const $this = $(this);
        const index = $inputs.index(this);

        if (e.key === 'Backspace' || e.key === 'Delete') {
          if (this.value === '') {
            // Move to previous if current is already empty
            if (index > 0) {
              e.preventDefault();
              const $prev = $inputs.eq(index - 1);
              $prev.focus();
              $prev.val('').removeClass('filled error');
            }
          } else {
            // Just clear current on backspace/delete (browser handles it)
            $this.removeClass('filled error');
          }
        }
        else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (index > 0) {
            $inputs.eq(index - 1).focus();
          }
        }
        else if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (index < $inputs.length - 1) {
            $inputs.eq(index + 1).focus();
          }
        }
      });

      // Paste support (on any field)
      $inputs.on('paste', function(e) {
        e.preventDefault();
        const paste = (e.originalEvent || e).clipboardData.getData('text').replace(/\D/g, '');
        if (!paste) return;

        let currentIndex = $inputs.index(this);
        let chars = paste.split('').slice(0, 6 - currentIndex);

        $inputs.each(function(i) {
          if (i >= currentIndex && chars.length > 0) {
            const char = chars.shift();
            $(this).val(char).addClass('filled').removeClass('error');
          }
        });

        // Focus the next logical field after paste
        const nextFocusIndex = Math.min(currentIndex + paste.length, 5);
        $inputs.eq(nextFocusIndex).focus();

        checkIfComplete();
      });

      function checkIfComplete() {
        if ($inputs.filter((i, el) => el.value.length === 1).length === 6) {
          const code = $inputs.map((i, el) => el.value).get().join('');
          setTimeout(() => {
            alert('OTP Submitted: ' + code);
            $inputs.val('').removeClass('filled');
          }, 300);
        }
      }

      // Resend simulation
      $('#resendLink').click(function(e) {
        e.preventDefault();
        alert('Resend requested.');
        $(".code-expire").hide();
        $(".resend-box").show();
      });

      // Simple countdown demo
      let time = 5;
      const $timer = $('#timer');
      const countdown = setInterval(() => {
        time--;
        const min = Math.floor(time / 60).toString().padStart(2,'0');
        const sec = (time % 60).toString().padStart(2,'0');
        $timer.text(min + ':' + sec);
        if (time <= 0) {
          clearInterval(countdown);
          $(".code-expire").hide();
          $(".resend-box").show();
        }
      }, 1000);
    });
  </script>

</body>
</html>
