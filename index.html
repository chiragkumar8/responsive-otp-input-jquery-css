<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive OTP Input with Arrow Keys (HTML + CSS + jQuery)</title>

  <link rel="stylesheet" type="text/css" href="style.css">
  
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" 
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
          crossorigin="anonymous"></script>

  <script src="script.js"></script>
  
</head>
<body>
  <div class="container">
    <h1>Verify Your Number</h1>
    <p class="subtitle">Enter the 6-digit code sent to<br>+91 XXXXXX9876</p>

    <div class="otp-container" id="otpContainer">
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
      <input type="text" class="otp-box" maxlength="1" autocomplete="off" inputmode="numeric" pattern="[0-9]*"/>
    </div>

    <div class="resend-box">
      Didn't receive code? <a href="#" class="resend" id="resendLink">Resend</a>
    </div>

    <div class="code-expire">
      Code expires in  <span id="timer">00:05</span> 
    </div>
  </div>
</body>
</html>
